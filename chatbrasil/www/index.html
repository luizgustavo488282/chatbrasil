<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBrasil - Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --bg-main: #182533;
    --bg-side: #17212b;
    --tg-blue: #5288c1;
    --tg-hover: #6499d3;
    --text-color: #f5f5f5;
    --text-muted: #7f91a4;
    --bg-cookie: #243447;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
}

body {
    background: var(--bg-main);
    color: var(--text-color);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* TELA DE CARREGAMENTO ESTILO WHATSAPP */
.whatsapp-splash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--bg-main);
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s ease, visibility 0.5s ease;
}

.whatsapp-splash.fade-out {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

.splash-logo {
    font-size: 70px;
    color: var(--text-muted);
    opacity: 0.8;
    animation: pulseLogo 1.5s ease-in-out infinite alternate;
    margin-bottom: 40px;
}

@keyframes pulseLogo {
    from { transform: scale(0.95); opacity: 0.6; }
    to { transform: scale(1.05); opacity: 1; }
}

.splash-progress-container {
    position: absolute;
    bottom: 12%;
    width: 250px;
    height: 3px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    overflow: hidden;
}

.splash-progress-bar {
    width: 0%;
    height: 100%;
    background: var(--tg-blue);
    border-radius: 10px;
    animation: loadProgress 2.2s cubic-bezier(0.1, 0.5, 0.3, 1) forwards;
}

@keyframes loadProgress {
    0% { width: 0%; }
    20% { width: 25%; }
    50% { width: 65%; }
    85% { width: 90%; }
    100% { width: 100%; }
}

.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #22364d, var(--bg-main));
}

.login-card {
    position: relative;
    width: 360px;
    background: var(--bg-side);
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: tgFadeIn 0.45s cubic-bezier(0.1, 0.8, 0.25, 1) forwards;
    z-index: 2;
}

@keyframes tgFadeIn {
    from { opacity: 0; transform: scale(0.85) translateY(40px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

.logo {
    text-align: center;
    font-size: 50px;
    color: var(--tg-blue);
    margin-bottom: 10px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.input-group {
    position: relative;
    margin-bottom: 15px;
}

.input-group i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
}

.input-group input {
    width: 100%;
    padding: 12px 12px 12px 38px;
    border-radius: 10px;
    border: none;
    background: var(--bg-main);
    color: white;
    outline: none;
    transition: 0.2s;
}

.input-group input:focus {
    border: 1px solid var(--tg-blue);
}

.remember-group {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
}

.remember-group input {
    margin-right: 8px;
    accent-color: var(--tg-blue);
    cursor: pointer;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--tg-blue);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: var(--tg-hover);
}

.error {
    background: rgba(255,0,0,0.1);
    color: #ff6b6b;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 10px;
    text-align: center;
    display: none;
}

a {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: var(--tg-blue);
    text-decoration: none;
    font-size: 13px;
}

a:hover {
    text-decoration: underline;
}

.cookie-banner {
    position: fixed;
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-cookie);
    padding: 15px 25px;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    width: 90%;
    max-width: 600px;
    z-index: 9999;
    transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid rgba(255,255,255,0.05);
}

.cookie-banner.show { bottom: 20px; }

@media(max-width: 480px){
    body { align-items: flex-start; background: var(--bg-side); }
    .bg { display: none; }
    .login-card {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
        padding: 60px 25px 30px 25px;
        background: var(--bg-side);
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }
}
</style>
</head>
<body>

<div class="whatsapp-splash" id="whatsappSplash">
    <div class="splash-logo">
        <i class="fa-solid fa-comment-dots"></i>
    </div>
    <div class="splash-progress-container">
        <div class="splash-progress-bar"></div>
    </div>
</div>

<div class="bg"></div>

<div class="login-card">
    <div class="logo">
        <i class="fa-solid fa-comment-dots"></i>
    </div>

    <h2>Entrar</h2>

    <div class="error" id="errorDiv"></div>

    <form id="loginForm">
        <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" id="username" placeholder="Usuário" required>
        </div>

        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" id="password" placeholder="Senha" required>
        </div>

        <label class="remember-group">
            <input type="checkbox" id="remember" checked>
            Mantenha-me conectado
        </label>

        <button type="submit">Entrar</button>
    </form>

    <a href="#/register">Criar conta</a>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const splash = document.getElementById('whatsappSplash');
    const errorDiv = document.getElementById('errorDiv');
    const loginForm = document.getElementById('loginForm');

    // Remove o Splash Screen
    setTimeout(() => {
        splash.classList.add('fade-out');
    }, 2200);

    // Envio do formulário via fetch para sua API externa em PHP
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        errorDiv.style.display = 'none';

        const usernameVal = document.getElementById('username').value;
        const passwordVal = document.getElementById('password').value;

        fetch('https://chatbrasil.qzz.io/api_login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: usernameVal, password: passwordVal })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                localStorage.setItem('user_id', data.user.id);
                localStorage.setItem('username', data.user.username);
                // Aqui usamos o roteamento em hash para a home conforme seu script de build exige
                window.location.href = "#/home"; 
            } else {
                errorDiv.innerText = data.message;
                errorDiv.style.display = 'block';
            }
        })
        .catch(err => {
            errorDiv.innerText = "Erro ao conectar com o servidor.";
            errorDiv.style.display = 'block';
        });
    });
});
</script>

</body>
</html>
